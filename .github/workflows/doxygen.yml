name: Doxygen

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  generate-docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Doxygen, Graphviz and PlantUML
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq doxygen graphviz plantuml

      - name: Generate documentation
        run: |
          set -o pipefail
          PLANTUML_JAR_PATH="$(dpkg -L plantuml | grep '/plantuml\.jar$' | head -n 1)"
          for candidate in /usr/share/plantuml/plantuml.jar /usr/share/java/plantuml.jar; do
            if [ -z "$PLANTUML_JAR_PATH" ] && [ -f "$candidate" ]; then
              PLANTUML_JAR_PATH="$candidate"
            fi
          done
          if [ -z "$PLANTUML_JAR_PATH" ]; then
            echo "Unable to locate plantuml.jar" >&2
            exit 1
          fi
          echo "Using PlantUML JAR: $PLANTUML_JAR_PATH"
          export PLANTUML_JAR_PATH
          doxygen doxygen/Doxyfile

      - name: Upload documentation
        uses: actions/upload-artifact@v4
        with:
          name: doxygen-docs
          path: docs-gen/html
          retention-days: 14
