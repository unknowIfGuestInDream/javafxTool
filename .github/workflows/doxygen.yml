name: Doxygen

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  generate-docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Doxygen, Graphviz and PlantUML
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq doxygen graphviz plantuml

      - name: Generate documentation
        run: |
          PLANTUML_JAR_PATH="$(dpkg -L plantuml | grep '/plantuml\.jar$' | head -n 1)"
          if [ -z "$PLANTUML_JAR_PATH" ] && [ -f /usr/share/plantuml/plantuml.jar ]; then
            PLANTUML_JAR_PATH=/usr/share/plantuml/plantuml.jar
          fi
          if [ -z "$PLANTUML_JAR_PATH" ] && [ -f /usr/share/java/plantuml.jar ]; then
            PLANTUML_JAR_PATH=/usr/share/java/plantuml.jar
          fi
          if [ -z "$PLANTUML_JAR_PATH" ]; then
            echo "Unable to locate plantuml.jar" >&2
            exit 1
          fi
          export PLANTUML_JAR_PATH
          doxygen doxygen/Doxyfile

      - name: Upload documentation
        uses: actions/upload-artifact@v4
        with:
          name: doxygen-docs
          path: docs-gen/html
          retention-days: 14
